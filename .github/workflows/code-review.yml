name: Code Review

on:
  pull_request:
    branches: [master, dev]

jobs:
  review:
    name: Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shebangs
        run: |
          echo "Checking for #!/usr/bin/env bash shebangs..."
          errors=0
          for script in $(find . -name "*.sh" -type f -o -path "./.local/bin/*" -type f); do
            if [ -f "$script" ]; then
              first_line=$(head -1 "$script")
              if [[ "$first_line" != "#!/usr/bin/env bash" && "$first_line" != "#!/usr/bin/env fish" ]]; then
                echo "ERROR: $script has incorrect shebang: $first_line"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors files with incorrect shebangs"
            exit 1
          fi
          echo "All shebangs are correct"

      - name: Check executable permissions
        run: |
          echo "Checking executable permissions on scripts..."
          errors=0
          for script in install.sh update.sh uninstall.sh install/*.sh .local/bin/* .config/rofi/scripts/*.sh .config/waybar/scripts/*.sh .local/share/dark-mode.d/*.sh .local/share/light-mode.d/*.sh; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "ERROR: $script is not executable"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$files missing executable permission"
            exit 1
          fi
          echo "All scripts are executable"

      - name: Check for TODO/FIXME comments
        run: |
          echo "Scanning for TODO/FIXME comments..."
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.sh" --include="*.fish" --include="*.kdl" --include="*.json" --include="*.jsonc" --include="*.toml" --include="*.css" --include="*.rasi" . 2>/dev/null | wc -l)
          echo "Found $count TODO/FIXME/HACK/XXX comments"
          if [ "$count" -gt 0 ]; then
            echo "--- Details ---"
            grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.sh" --include="*.fish" --include="*.kdl" --include="*.json" --include="*.jsonc" --include="*.toml" --include="*.css" --include="*.rasi" . 2>/dev/null || true
          fi

      - name: Check for hardcoded paths
        run: |
          echo "Checking for hardcoded /home/ paths..."
          count=$(grep -rn "/home/[a-zA-Z]" --include="*.sh" --include="*.fish" --include="*.conf" --include="*.kdl" --include="*.toml" . 2>/dev/null | grep -v "fish_variables" | grep -v "AGENTS.md" | wc -l)
          echo "Found $count potential hardcoded paths"
          if [ "$count" -gt 0 ]; then
            echo "--- Details ---"
            grep -rn "/home/[a-zA-Z]" --include="*.sh" --include="*.fish" --include="*.conf" --include="*.kdl" --include="*.toml" . 2>/dev/null | grep -v "fish_variables" | grep -v "AGENTS.md" || true
          fi

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          errors=0
          for json in $(find . -name "*.json" -type f); do
            if ! jq empty "$json" 2>/dev/null; then
              echo "ERROR: Invalid JSON in $json"
              errors=$((errors + 1))
            fi
          done
          for jsonc in $(find . -name "*.jsonc" -type f); do
            if ! jq empty "$jsonc" 2>/dev/null; then
              echo "WARNING: Could not validate JSONC in $jsonc (may contain comments)"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            exit 1
          fi
          echo "All JSON files are valid"

      - name: Validate TOML files
        run: |
          echo "Validating TOML files..."
          pip install toml-check 2>/dev/null || pip3 install toml-check 2>/dev/null || true
          if command -v toml-check &>/dev/null; then
            for toml in $(find . -name "*.toml" -type f); do
              if ! toml-check "$toml" 2>/dev/null; then
                echo "WARNING: Could not validate TOML in $toml"
              fi
            done
          else
            echo "toml-check not available, skipping TOML validation"
          fi

      - name: Check for missing sourced files
        run: |
          echo "Checking for source statements that reference non-existent files..."
          errors=0
          for script in $(find . -name "*.sh" -type f); do
            while IFS= read -r line; do
              file=$(echo "$line" | sed -n "s/.*source ['\"]\\([^'\"]*\\)['\"].*/\\1/p")
              if [ -n "$file" ]; then
                script_dir=$(dirname "$script")
                if [ ! -f "$file" ] && [ ! -f "$script_dir/$file" ]; then
                  echo "WARNING: $script sources '$file' which may not exist"
                  errors=$((errors + 1))
                fi
              fi
            done < "$script"
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors potential missing source files"
          else
            echo "All sourced files exist"
          fi

      - name: Check for duplicate code patterns
        run: |
          echo "Checking for common duplicate patterns that could be refactored..."
          echo "--- Restart pattern (pkill/sleep/start) ---"
          grep -rn "pkill.*2>/dev/null || true" --include="*.sh" . 2>/dev/null | wc -l
          echo "--- FZF args pattern ---"
          grep -rn "fzf_args=" --include="*.sh" . 2>/dev/null | wc -l
          echo "--- notify-send + zenith-done pattern ---"
          grep -rn "zenith-done" --include="*.sh" . 2>/dev/null | wc -l
