name: ShellCheck

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          check_together: true
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC1090 -e SC2034 -e SC2155 -e SC2218