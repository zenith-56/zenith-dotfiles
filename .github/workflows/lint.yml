name: Lint

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Find all shell scripts
        run: |
          scripts=$(find . -name "*.sh" -type f | tr '\n' ' ')
          echo "Found scripts: $scripts"

      - name: Run ShellCheck
        run: |
          set -e
          shellcheck install/*.sh install.sh update.sh uninstall.sh || true
          shellcheck .local/bin/* || true
          shellcheck .config/rofi/scripts/*.sh || true
          shellcheck .config/waybar/scripts/*.sh || true
          shellcheck .local/share/dark-mode.d/*.sh || true
          shellcheck .local/share/light-mode.d/*.sh || true
          echo "ShellCheck complete"