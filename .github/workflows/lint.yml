name: Lint

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on install scripts
        run: |
          shellcheck install/*.sh install.sh

      - name: Run ShellCheck on bin scripts
        run: |
          shellcheck .local/bin/*

      - name: Run ShellCheck on config scripts
        run: |
          shellcheck .config/rofi/scripts/*.sh
          shellcheck .config/waybar/scripts/*.sh
          shellcheck .local/share/dark-mode.d/*.sh
          shellcheck .local/share/light-mode.d/*.sh
