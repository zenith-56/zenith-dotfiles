name: Install Structure

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify install structure
        run: |
          [ -f "install.sh" ] || { echo "Missing install.sh"; exit 1; }
          [ -d "install" ] || { echo "Missing install directory"; exit 1; }
          [ -d ".local/bin" ] || { echo "Missing .local/bin directory"; exit 1; }
          echo "Structure verified"

      - name: Check scripts are executable
        run: |
          count=$(find . -name "*.sh" -type f ! -executable | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "Non-executable scripts: $count"
            find . -name "*.sh" -type f ! -executable
            exit 1
          fi
          echo "All scripts are executable"

      - name: Validate shell scripts syntax
        run: |
          errors=0
          for script in $(find . -name "*.sh" -type f); do
            if ! bash -n "$script" 2>&1; then
              echo "Syntax error in: $script"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors scripts with syntax errors"
            exit 1
          fi
          echo "All shell scripts have valid syntax"

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          set -e
          for script in $(find . -name "*.sh" -type f); do
            shellcheck "$script" || true
          done
          echo "ShellCheck complete"

      - name: Verify bin count
        run: |
          count=$(find .local/bin -type f 2>/dev/null | wc -l)
          echo "Bin scripts found: $count"
          if [ "$count" -lt 20 ]; then
            echo "Expected at least 20 bin scripts, found $count"
            exit 1
          fi

      - name: Verify matugen templates
        run: |
          [ -d ".config/matugen/templates" ] || { echo "Missing matugen templates"; exit 1; }

      - name: Verify rofi scripts
        run: |
          [ -d ".config/rofi/scripts" ] || { echo "Missing rofi scripts"; exit 1; }

      - name: Verify KDL configs
        run: |
          [ -d ".config/niri" ] || { echo "Missing niri config"; exit 1; }
          [ -d ".config/hypr" ] || { echo "Missing hypr config"; exit 1; }