# =============================================================================
# Hypridle Configuration
# =============================================================================
# Description : Idle management daemon configuration.
#               Controls screen lock, brightness reduction, monitor power-off,
#               and system suspend based on inactivity timeouts.
# =============================================================================

general {
    # Command to execute for screen locking
    lock_cmd = pidof hyprlock || hyprlock
    # Lock before PC enters sleep (lid closed or systemctl suspend)
    before_sleep_cmd = loginctl lock-session
    # Ensure monitor turns on when waking up
    after_sleep_cmd = niri msg action power-on-monitors
}

# 1. POWER SAVING: Lower brightness at 2 minutes and start hyprlock (150s)
listener {
    timeout = 150
    on-timeout = brightnessctl set 10% -q
    on-resume = brightnessctl set 100% -q
}

# 2. SECURITY: Lock screen at 5 minutes (300s)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. MONITOR: Turn off screens at 5.5 minutes (330s)
# Using Niri's native command to avoid redraw bugs
listener {
    timeout = 330
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}

# 4. SUSPEND: Full shutdown at 10 minutes (600s)
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
